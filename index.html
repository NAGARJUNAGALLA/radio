<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhashyaVani Radio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS remains the same as previous version */
        :root { --bg: #0a192f; --pink: #f8bbd0; --yellow: #ffca28; }
        body { margin: 0; background: linear-gradient(180deg, #0d253f 0%, #06111d 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; }
        .player-card { width: 320px; text-align: center; }
        .logo-circle { width: 180px; height: 180px; background: var(--pink); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .logo-circle i { font-size: 70px; color: #4dd0e1; }
        .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--yellow); }
        .play-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--pink); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="logo-circle"><i class="fas fa-microphone-alt"></i></div>
        <h2 id="songName">BhashyaVani</h2>
        <p id="status">Ready to Play</p>

        <div class="progress-bar"><div id="progress-fill"></div></div>

        <button class="play-btn" onclick="togglePlay()">
            <i id="playIcon" class="fas fa-play"></i>
        </button>

        <audio id="mainAudio"></audio>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status');
        const songNameDisplay = document.getElementById('songName');

        // --- CONFIGURATION ---
        // 1. Your base GitHub Raw URL (ending with a slash /)
        const baseURL = "https://raw.githubusercontent.com/nagarjunaalla/radio/main/songs/";

        // 2. Just list the filenames
        const songFiles = [
            "song1.mp3",
            "song2.mp3",
            "song3.mp3",
            "song4.mp3",
            "song5.mp3",
            "song6.mp3",
            "song7.mp3",
            "song8.mp3",
            "song9.mp3",
            "song11.mp3",
            "song12.mp3",
            "song13.mp3",
            "song14.mp3",
            "song15.mp3",
            "song16.mp3",
            "song17.mp3",
            "song18.mp3",
            "song19.mp3"
        ];
        // ---------------------

        function loadRandomSong() {
            const randomIndex = Math.floor(Math.random() * songFiles.length);
            const selectedFile = songFiles[randomIndex];
            
            // Combine Base URL + Filename
            audio.src = baseURL + selectedFile;
            
            // Update UI (Removes .mp3 from display name)
            songNameDisplay.innerText = selectedFile.replace('.mp3', '').replace('_', ' ');
            statusText.innerText = "Next track ready";
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Click play to start"));
                playIcon.classList.replace('fa-play', 'fa-pause');
                statusText.innerText = "Now Playing...";
            } else {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                statusText.innerText = "Paused";
            }
        }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + "%";
        };

        // When song ends, load a new random song and play automatically
        audio.onended = () => {
            loadRandomSong();
            audio.play();
        };

        // Initial Load
        window.onload = loadRandomSong;
    </script>
</body>
</html>
